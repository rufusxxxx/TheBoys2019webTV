<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Встановлення пароля | CommentApp</title>
  <link rel="stylesheet" href="/style/style.css">
</head>
<body>
  <div class="container" style="max-width: 450px; margin-top: 5rem;">
    <div class="card">
      <h1>🔒 Створіть пароль</h1>
      <p>Ваш email підтверджено. Залишилось придумати пароль для входу.</p>
      <form id="set-password-form">
        <div class="form-group">
          <label for="password">Пароль (мін. 6 символів)</label>
          <input type="password" id="password" placeholder="Мінімум 6 символів" required minlength="6" autofocus>
        </div>
        <div class="form-group">
          <label for="confirm">Підтвердження пароля</label>
          <input type="password" id="confirm" placeholder="Введіть ще раз" required>
        </div>
        <button type="submit" id="submit-btn" style="width: 100%;">Завершити реєстрацію</button>
      </form>
      <div id="message"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    (async () => {
      const { data: { session }, error: sessionError } = await sb.auth.getSession();
      if (sessionError || !session) {
        showMessage('Сесія не знайдена. Почніть реєстрацію спочатку.', 'error');
        setTimeout(() => window.location.href = '/register.html', 2000);
        return;
      }
      
      const { data: { user }, error: userError } = await sb.auth.getUser();
      if (userError || !user) {
        showMessage('Користувача не знайдено. Спробуйте ще раз.', 'error');
        setTimeout(() => window.location.href = '/register.html', 2000);
        return;
      }
      
      const form = document.getElementById('set-password-form');
      const submitBtn = document.getElementById('submit-btn');
      
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        clearMessage();
        
        if (password !== confirm) {
          showMessage('Паролі не співпадають', 'error');
          return;
        }
        if (password.length < 6) {
          showMessage('Пароль має містити щонайменше 6 символів', 'error');
          return;
        }
        
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Збереження...';
        
        try {
          const setRes = await fetch(`${API_BASE}/auth/set-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id, password })
          });
          const setData = await setRes.json();
          if (!setRes.ok) {
            showMessage(setData.error, 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            return;
          }
          
          const loginRes = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: user.email, password })
          });
          const loginData = await loginRes.json();
          if (!loginRes.ok || !loginData.session) {
            showMessage('Пароль встановлено, але не вдалося увійти автоматично. Спробуйте увійти вручну.', 'error');
            setTimeout(() => window.location.href = '/login.html', 2000);
            return;
          }
          
          await sb.auth.setSession({
            access_token: loginData.session.access_token,
            refresh_token: loginData.session.refresh_token
          });
          
          showMessage('🎉 Реєстрація завершена! Переадресація...', 'success');
          setTimeout(() => window.location.href = '/?openProfile=1', 1500);
        } catch (err) {
          console.error('Set password or login error:', err);
          showMessage('Помилка мережі', 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });
    })();
  </script>
</body>
</html>
