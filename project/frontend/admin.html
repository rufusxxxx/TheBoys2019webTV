<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Адмін панель</title>
  <link rel="stylesheet" href="/style/style.css">
</head>
<body>
  <header class="admin-header">
    <h1><img src="img/admin.png" width="30" height="30"> Адмін панель</h1>
    <nav>
      <a href="/">Головна сторінка</a>
      <a href="#" id="logout-btn">Вийти</a>
    </nav>
  </header>

  <main class="container">
    <div class="card">
      <h2><img src="img/statistic.png" width="26" height="26"> Статистика</h2>
      <p><strong>Користувачів:</strong> <span id="users-count"></span></p>
      <p><strong>Коментарів:</strong> <span id="comments-count"></span></p>
    </div>

    <div class="card">
      <h2><img src="img/users.png" width="26" height="26"> Користувачі</h2>
      <div class="table-wrapper">
        <table id="users-table">
          <thead>
            <tr><th>Email</th><th>Ім'я</th><th>Роль</th><th>Забанений</th><th>Дії</th></tr>
          </thead>
          <tbody id="users-list"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>💬 Усі коментарі</h2>
      <div id="admin-comments-list"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    let session = null;

    async function init() {
      session = await requireAuth();
      if (!session) return;
      
      try {
        const res = await fetch(`${API_BASE}/users/profile`, {
          headers: { 'Authorization': `Bearer ${session.access_token}` }
        });
        const data = await res.json();
        if (!res.ok || data.profile?.role !== 'admin') {
          showMessage('Доступ заборонено', 'error');
          setTimeout(() => window.location.href = '/', 2000);
          return;
        }
      } catch (err) {
        window.location.href = '/';
        return;
      }

      document.getElementById('logout-btn').addEventListener('click', (e) => {
        e.preventDefault();
        logout();
      });

      loadDashboard();
      loadUsers();
      loadComments();
    }

    async function loadDashboard() {
      try {
        const res = await fetch(`${API_BASE}/admin/dashboard`, {
          headers: { 'Authorization': `Bearer ${session.access_token}` }
        });
        const data = await res.json();
        document.getElementById('users-count').textContent = data.usersCount;
        document.getElementById('comments-count').textContent = data.commentsCount;
      } catch (err) { console.error(err); }
    }

    async function loadUsers() {
      try {
        const res = await fetch(`${API_BASE}/admin/users`, {
          headers: { 'Authorization': `Bearer ${session.access_token}` }
        });
        const data = await res.json();
        renderUsers(data.users);
      } catch (err) { console.error(err); }
    }

    function renderUsers(users) {
      const tbody = document.getElementById('users-list');
      tbody.innerHTML = users.map(user => `
        <tr>
          <td>${escapeHtml(user.email)}</td>
          <td>${escapeHtml(user.name || '—')}</td>
          <td>${user.role}</td>
          <td>${user.is_banned ? 'Так' : 'Ні'}</td>
          <td>
            ${user.role !== 'admin' ? `
              ${user.is_banned 
                ? `<button class="unban-btn" data-id="${user.id}">🔓 Розбанити</button>`
                : `<button class="ban-btn danger" data-id="${user.id}">🔒 Забанити</button>`
              }
            ` : ''}
          </td>
        </table>
      `).join('');

      document.querySelectorAll('.ban-btn').forEach(btn => {
        btn.addEventListener('click', () => banUser(btn.dataset.id, true));
      });
      document.querySelectorAll('.unban-btn').forEach(btn => {
        btn.addEventListener('click', () => banUser(btn.dataset.id, false));
      });
    }

    async function banUser(userId, ban) {
      const endpoint = ban ? 'ban' : 'unban';
      try {
        const res = await fetch(`${API_BASE}/admin/users/${userId}/${endpoint}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${session.access_token}` }
        });
        if (res.ok) {
          loadUsers();
          loadComments();
        } else {
          const data = await res.json();
          showMessage(data.error, 'error');
        }
      } catch (err) { showMessage('Помилка мережі', 'error'); }
    }

    async function loadComments() {
      try {
        const res = await fetch(`${API_BASE}/comments`);
        const data = await res.json();
        renderAdminComments(data.comments);
      } catch (err) { console.error(err); }
    }

    function renderAdminComments(comments) {
      const container = document.getElementById('admin-comments-list');
      container.innerHTML = comments.map(comment => {
        const profile = comment.profiles;
        return `
          <div class="admin-comment">
            <p><strong>${escapeHtml(profile?.name || 'Анонім')}</strong> 
               <span style="font-size:0.8rem; color:var(--gray-600);">${new Date(comment.created_at).toLocaleString()}</span>
            </p>
            <p>${escapeHtml(comment.content || '')}</p>
            ${comment.image_url ? `<img src="${comment.image_url}" class="admin-comment-image">` : ''}
            <button class="danger delete-comment-admin" data-id="${comment.id}"><img src="img/drop.png" width="23" height="23"> Видалити</button>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.delete-comment-admin').forEach(btn => {
        btn.addEventListener('click', deleteComment);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function deleteComment(e) {
      const commentId = e.target.dataset.id;
      const confirmed = await showConfirmModal({
        title: 'Підтвердження',
        message: 'Видалити цей коментар?',
        yesText: 'Так, видалити',
        noText: 'Скасувати'
      });
      if (!confirmed) return;
      try {
        const res = await fetch(`${API_BASE}/admin/comments/${commentId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${session.access_token}` }
        });
        if (res.ok) {
          loadComments();
          loadDashboard();
        } else {
          const data = await res.json();
          showMessage(data.error, 'error');
        }
      } catch (err) { showMessage('Помилка мережі', 'error'); }
    }

    init();
  </script>
</body>
</html>
