<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обробка підтвердження...</title>
  <link rel="stylesheet" href="/style/style.css">
</head>
<body>
  <div class="container" style="max-width: 500px; margin-top: 5rem;">
    <div class="card" style="text-align: center;">
      <div style="margin-bottom: 1rem;">⏳</div>
      <h2 id="status-title">Перевірка...</h2>
      <p id="status-message" style="color: var(--gray-600);"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    (async () => {
      const titleEl = document.getElementById('status-title');
      const msgEl = document.getElementById('status-message');
      
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const urlParams = new URLSearchParams(window.location.search);
      const flow = urlParams.get('flow');

      if (!accessToken) {
        titleEl.textContent = '❌ Помилка';
        msgEl.textContent = 'Немає токену доступу. Спробуйте ще раз.';
        return;
      }

      try {
        const { data, error } = await sb.auth.setSession({ 
          access_token: accessToken, 
          refresh_token: refreshToken 
        });
        if (error) throw error;

        if (data.session) {
          localStorage.setItem('supabaseSession', JSON.stringify(data.session));
        }

        if (flow === 'signup') {
          titleEl.textContent = '✅ Email підтверджено!';
          msgEl.textContent = 'Зараз ви перейдете до створення пароля...';
          setTimeout(() => window.location.href = '/set-password.html', 1500);
        } else {
          titleEl.textContent = '🔓 Доступ підтверджено';
          msgEl.textContent = 'Перехід до встановлення нового пароля...';
          setTimeout(() => window.location.href = '/reset-password.html', 1500);
        }
      } catch (err) {
        console.error('Auth callback error:', err);
        titleEl.textContent = '❌ Помилка';
        msgEl.textContent = err.message;
      }
    })();
  </script>
</body>
</html>
