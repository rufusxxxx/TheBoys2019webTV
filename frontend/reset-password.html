<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новий пароль | CommentApp</title>
  <link rel="stylesheet" href="/style/style.css">
</head>
<body>
  <div class="container" style="max-width: 450px; margin-top: 5rem;">
    <div class="card">
      <h1>🔄 Новий пароль</h1>
      <form id="reset-password-form">
        <div class="form-group">
          <label for="password">Новий пароль</label>
          <input type="password" id="password" required minlength="6" autofocus>
        </div>
        <div class="form-group">
          <label for="confirm">Підтвердження</label>
          <input type="password" id="confirm" required>
        </div>
        <button type="submit" style="width: 100%;">Оновити пароль</button>
      </form>
      <div id="message"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    (async () => {
      const { data: { session }, error: sessionError } = await sb.auth.getSession();
      if (sessionError || !session) {
        showMessage('Посилання застаріло. Запитайте нове.', 'error');
        setTimeout(() => window.location.href = '/forgot-password.html', 2000);
        return;
      }
      
      const { data: { user }, error: userError } = await sb.auth.getUser();
      if (userError || !user) {
        showMessage('Користувача не знайдено.', 'error');
        setTimeout(() => window.location.href = '/forgot-password.html', 2000);
        return;
      }
      
      document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        clearMessage();
        
        if (password !== confirm) {
          showMessage('Паролі не співпадають', 'error');
          return;
        }
        
        try {
          const res = await fetch(`${API_BASE}/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id, password })
          });
          const data = await res.json();
          if (res.ok) {
            showMessage('✅ Пароль оновлено! Зараз ви зможете увійти.', 'success');
            await sb.auth.signOut();
            localStorage.clear();
            setTimeout(() => window.location.href = '/login.html', 2000);
          } else {
            showMessage(data.error, 'error');
          }
        } catch (err) {
          showMessage('Помилка мережі', 'error');
        }
      });
    })();
  </script>
</body>
</html>
