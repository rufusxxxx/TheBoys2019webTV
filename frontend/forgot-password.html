<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Відновлення пароля | CommentApp</title>
  <link rel="stylesheet" href="/style/style.css">
</head>
<body>
  <div class="container" style="max-width: 450px; margin-top: 5rem;">
    <div class="card">
      <h1>🔐 Забули пароль?</h1>
      <p>Введіть email, і ми надішлемо посилання для скидання пароля.</p>
      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required autofocus>
        </div>
        <button type="submit" style="width: 100%;">Надіслати лист</button>
        <p style="margin-top: 1.5rem; text-align: center;">
          <a href="/login.html">← Повернутись до входу</a>
        </p>
      </form>
      <div id="message"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      clearMessage();
      
      try {
        const res = await fetch(`${API_BASE}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) {
          showMessage(`📬 Лист для скидання пароля надіслано на ${email}. Перевірте пошту.`, 'success');
        } else {
          showMessage(data.error, 'error');
        }
      } catch (err) {
        showMessage('Помилка мережі.', 'error');
      }
    });
  </script>
</body>
</html>
